<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto Hit Counter Overlay</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', sans-serif;
            color: #e0e0e0;
            font-size: 16px;
            overflow: hidden;
        }

        #overlay {
            display: inline-block;
            width: 300px;
            padding: 6px;
        }

        .header {
            display: grid;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #777;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 2px;
        }

        .header span:not(:first-child) {
            text-align: center;
        }

        .split-row {
            display: grid;
            padding: 4px 8px;
            font-size: 15px;
            font-weight: 400;
            transition: background 0.2s ease, border-color 0.2s ease;
            border-left: 3px solid transparent;
        }

        .split-row:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .split-row .col-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .split-row .col-hits,
        .split-row .col-diff,
        .split-row .col-pb {
            text-align: center;
        }

        .split-row.current {
            border-left-color: #00cc66;
            background: rgba(0, 204, 102, 0.06);
        }

        .split-row.parent {
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.03em;
            color: #999;
            padding-top: 8px;
            border-left-color: transparent;
            background: transparent;
        }

        .split-row.parent .col-hits,
        .split-row.parent .col-diff,
        .split-row.parent .col-pb {
            visibility: hidden;
        }

        .diff-pos {
            color: #ff4c4c;
        }

        .diff-neg {
            color: #00cc66;
        }

        .diff-zero {
            color: #555;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px 2px;
            margin-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
            color: #888;
        }

        .footer .totals span {
            margin-right: 12px;
        }

        .footer .totals .label {
            color: #666;
        }

        .footer .totals .value {
            color: #ccc;
            font-weight: 600;
        }

        .igt {
            font-family: Consolas, monospace;
            font-size: 14px;
            color: #aaa;
        }

    </style>
</head>
<body>
<div id="overlay">
    <div class="header" id="header"></div>
    <div id="splits"></div>
    <div class="footer">
        <div class="totals" id="totals"></div>
        <div class="igt" id="igt"></div>
    </div>
    <div class="run-complete" id="runComplete" style="display:none;">✓ Run Complete</div>
</div>

<script>
    (function () {
        const WS_URL = 'ws://localhost:16200';
        const RECONNECT_INTERVAL = 3000;

        const DEFAULTS = {
            maxSplits: 12,
            prevSplits: 4,
            nextSplits: 8,
            showDiff: true,
            showPb: true,
            showIgt: true
        }

        let config = {...DEFAULTS}

        const overlay = document.getElementById('overlay');
        const headerEl = document.getElementById('header');
        const splitsEl = document.getElementById('splits');
        const totalsEl = document.getElementById('totals');
        const igtEl = document.getElementById('igt');
        const runCompleteEl = document.getElementById('runComplete');

        let ws = null;
        let lastState = null;

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = function () {
            };

            ws.onclose = function () {
                setTimeout(connect, RECONNECT_INTERVAL);
            };

            ws.onerror = function () {
                ws.close();
            };

            ws.onmessage = function (event) {
                const msg = JSON.parse(event.data);

                if (msg.type === 'state') {
                    lastState = msg.data;
                    renderState(msg.data);
                } else if (msg.type === 'igt') {
                    igtEl.textContent = msg.data;
                } else if (msg.type === 'config') {
                    Object.assign(config, msg.data);
                    applyLayout();
                    if (lastState) renderState(lastState);
                }
            };
        }

        function getGridColumns() {
            let cols = '3fr 0.5fr';
            if (config.showDiff) cols += ' 0.5fr';
            if (config.showPb) cols += ' 0.5fr';
            return cols;
        }

        function applyLayout() {
            headerEl.style.gridTemplateColumns = getGridColumns();

            headerEl.innerHTML = `<span>Split</span><span>Hits</span>`
                + (config.showDiff ? '<span>Diff</span>' : '')
                + (config.showPb ? '<span>PB</span>' : '');

            igtEl.style.display = config.showIgt ? '' : 'none';
        }

        function renderState(state) {
            const cols = getGridColumns();
            let html = '';

            const limit = Math.min(state.splits.length, config.maxSplits);

            for (let i = 0; i < limit; i++) {
                html += buildRow(state.splits[i], cols);
            }
            splitsEl.innerHTML = html;

            let totalsHtml = `<span><span class="label">Hits </span><span class="value">${state.totalHits}</span></span>`;
            if (config.showPb) {
                totalsHtml += `<span><span class="label">PB </span><span class="value">${state.totalPb}</span></span>`;
            }
            totalsEl.innerHTML = totalsHtml;

            if (config.showIgt && state.inGameTime) {
                igtEl.textContent = state.inGameTime;
            }

            runCompleteEl.style.display = state.isRunComplete ? 'block' : 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function buildRow(s, cols) {
            const current = s.isCurrent ? ' current' : '';
            const parent = s.isParent ? ' parent' : '';
            const diffClass = s.diff > 0 ? 'diff-pos' : s.diff < 0 ? 'diff-neg' : 'diff-zero';
            const diffText = s.diff > 0 ? `+${s.diff}` : `${s.diff}`;

            return `<div class="split-row${parent}${current}" style="grid-template-columns: ${cols}">
                <span class="col-name">${escapeHtml(s.name)}</span>
                <span class="col-hits">${s.hits}</span>
                ${config.showDiff ? `<span class="col-diff ${diffClass}">${diffText}</span>` : ''}
                ${config.showPb ? `<span class="col-pb">${s.pb}</span>` : ''}
            </div>`;
        }

        applyLayout();
        connect();
    })();
</script>
</body>
</html>
